<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3c6e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e2a4f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DAA520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0c040;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#bgGrad)" />

  <!-- Cuban colonial building motif -->
  <!-- Arcade/colonnade -->
  <rect x="100" y="180" width="200" height="140" rx="4" fill="#FAF7F2" />

  <!-- Columns -->
  <rect x="105" y="180" width="18" height="140" rx="2" fill="#dbeafe" />
  <rect x="141" y="180" width="18" height="140" rx="2" fill="#dbeafe" />
  <rect x="177" y="180" width="18" height="140" rx="2" fill="#dbeafe" />
  <rect x="213" y="180" width="18" height="140" rx="2" fill="#dbeafe" />
  <rect x="249" y="180" width="18" height="140" rx="2" fill="#dbeafe" />
  <rect x="285" y="180" width="18" height="140" rx="2" fill="#dbeafe" />

  <!-- Arches between columns -->
  <path d="M123 180 Q132 155 141 180" fill="#1a3c6e" />
  <path d="M159 180 Q168 155 177 180" fill="#1a3c6e" />
  <path d="M195 180 Q204 155 213 180" fill="#1a3c6e" />
  <path d="M231 180 Q240 155 249 180" fill="#1a3c6e" />
  <path d="M267 180 Q276 155 285 180" fill="#1a3c6e" />

  <!-- Roof pediment -->
  <polygon points="100,180 110,150 200,130 290,150 300,180" fill="#DAA520" />
  <polygon points="110,150 120,145 200,128 280,145 290,150 200,135" fill="#f0c040" />

  <!-- Window on pediment -->
  <circle cx="200" cy="148" r="8" fill="#1a3c6e" />
  <circle cx="200" cy="148" r="5" fill="#dbeafe" />

  <!-- Door -->
  <rect x="185" y="240" width="30" height="80" rx="2" fill="#1a3c6e" />
  <circle cx="210" cy="280" r="3" fill="#DAA520" />

  <!-- Star (Cuban reference) -->
  <polygon points="200,95 204,108 218,108 207,116 211,129 200,121 189,129 193,116 182,108 196,108"
    fill="url(#goldGrad)" />

  <!-- Decorative lines -->
  <rect x="120" y="225" width="160" height="2" rx="1" fill="#DAA520" opacity="0.5" />
  <rect x="140" y="232" width="120" height="1" rx="1" fill="#DAA520" opacity="0.3" />
</svg>